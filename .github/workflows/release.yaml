name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 2.2.2)"
        required: true

permissions:
  contents: write
  # gh workflow run 需要 actions:write 才能用 GITHUB_TOKEN 触发 homebrew.yaml
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2

      - name: Validate version
        run: |
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version ${VERSION} is not in X.Y.Z format" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "v${VERSION}" >/dev/null; then
            echo "Tag v${VERSION} already exists" >&2
            exit 1
          fi

      - name: Bump version, commit and tag
        run: |
          uv version "$VERSION" --no-sync
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: 版本号升级至 ${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:main "refs/tags/v${VERSION}"

      # GITHUB_TOKEN 推送的 tag 不会触发 on.push 的 workflow（GitHub 防递归），
      # 必须通过 workflow_dispatch 显式触发 Homebrew bump
      - name: Trigger Homebrew bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run homebrew.yaml --ref "v${VERSION}" -f tag="v${VERSION}"

name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Pytest
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-24.04"]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        redis: [5, 6, 7, 7.2]
    runs-on: ${{ matrix.os }}

    services:
      redis:
        image: redis:${{ matrix.redis }}
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run pytest
        run: uv run pytest
        env:
          REDIS_VERSION: ${{ matrix.redis }}

  lint:
    name: ruff & ty
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ty check
        run: uv run ty check
